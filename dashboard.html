<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百日营3组 · 学员管理系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f7f4;
  --card: #ffffff;
  --text: #2c2824;
  --muted: #8c8580;
  --accent: #3b6e8f;
  --accent-light: #e8f1f7;
  --accent-dark: #254e68;
  --success: #4a9c7c;
  --success-bg: #eaf6f1;
  --warning: #c48a3f;
  --warning-bg: #fdf3e4;
  --danger: #b84a4a;
  --danger-bg: #fdf0f0;
  --border: #e8e4de;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.10);
  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Noto Serif SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
/* --- Noise Texture Overlay --- */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.5;
}

/* --- Header --- */
header {
  position: relative; z-index: 1;
  padding: 28px 40px 0;
  max-width: 1400px; margin: 0 auto;
}
.header-top {
  display: flex; justify-content: space-between; align-items: flex-end;
  padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.logo-area h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px; font-weight: 700; color: var(--text);
  letter-spacing: 0.02em;
}
.logo-area .subtitle {
  font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 500;
}
.stats-bar {
  display: flex; gap: 28px; align-items: center;
}
.stat-item { text-align: right; }
.stat-item .num {
  font-size: 26px; font-weight: 700; color: var(--accent);
  line-height: 1;
}
.stat-item .label {
  font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500;
}

/* --- Main Content --- */
main {
  position: relative; z-index: 1;
  max-width: 1400px; margin: 0 auto; padding: 24px 40px 60px;
}

/* --- Toolbar --- */
.toolbar {
  display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center;
}
.filter-btn {
  padding: 8px 18px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--card); font-size: 13px; cursor: pointer; transition: var(--transition);
  font-weight: 500; color: var(--muted); font-family: inherit;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.search-box {
  margin-left: auto; position: relative;
}
.search-box input {
  padding: 8px 14px 8px 34px; border-radius: 20px; border: 1.5px solid var(--border);
  font-size: 13px; outline: none; width: 200px; background: var(--card);
  transition: var(--transition); font-family: inherit;
}
.search-box input:focus { border-color: var(--accent); width: 240px; }
.search-box::before {
  content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 12px; pointer-events: none;
}

/* --- Member Grid --- */
.member-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 18px;
}
.member-card {
  background: var(--card); border-radius: var(--radius); padding: 22px;
  border: 1px solid var(--border); box-shadow: var(--shadow);
  cursor: pointer; transition: var(--transition); position: relative; overflow: hidden;
}
.member-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.member-card.unstarted { border-left: 3px solid var(--danger); }
.member-card.active-member { border-left: 3px solid var(--success); }
.member-card.partial { border-left: 3px solid var(--warning); }

.card-header {
  display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;
}
.card-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px; font-weight: 700;
}
.card-badge {
  padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
}
.badge-leader { background: var(--accent-light); color: var(--accent); }
.badge-member { background: var(--border); color: var(--muted); }
.card-region { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Progress bars */
.progress-section { margin-bottom: 12px; }
.progress-row {
  display: flex; align-items: center; margin-bottom: 8px; gap: 8px;
}
.progress-label {
  font-size: 12px; color: var(--muted); width: 56px; flex-shrink: 0; font-weight: 500;
}
.progress-track {
  flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.progress-fill.high { background: var(--success); }
.progress-fill.medium { background: var(--warning); }
.progress-fill.low { background: var(--danger); }
.progress-fill.zero { background: #e0dcd6; }
.progress-num {
  font-size: 12px; font-weight: 600; width: 36px; text-align: right; flex-shrink: 0;
}

/* --- Detail Panel --- */
.detail-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 40px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.detail-panel {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-lg);
  max-width: 720px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 36px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.detail-panel h2 {
  font-family: 'Noto Serif SC', serif; font-size: 24px; margin-bottom: 6px;
}
.detail-panel .detail-meta { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.detail-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
}
.detail-stat {
  text-align: center; padding: 14px 8px; background: var(--bg); border-radius: var(--radius-sm);
}
.detail-stat .ds-num { font-size: 22px; font-weight: 700; color: var(--accent); }
.detail-stat .ds-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
.detail-assignments h3 {
  font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.assignment-item {
  padding: 14px 16px; background: var(--bg); border-radius: var(--radius-sm);
  margin-bottom: 10px; border-left: 3px solid var(--accent);
}
.assignment-item .ai-date { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.assignment-item .ai-content { font-size: 13px; line-height: 1.7; }
.assignment-item .ai-feedback {
  margin-top: 8px; padding: 8px 12px; background: var(--warning-bg);
  border-radius: 6px; font-size: 12px; color: var(--warning); font-weight: 500;
}
.close-btn {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: var(--bg); cursor: pointer; font-size: 16px; transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { background: var(--border); }

/* --- Attendance Table (in a bottom section) --- */
.section-title {
  font-family: 'Noto Serif SC', serif; font-size: 22px; margin: 36px 0 18px;
  font-weight: 700;
}
.att-table-wrapper { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.att-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--card); }
.att-table th {
  background: var(--accent-light); color: var(--accent-dark); font-weight: 600;
  padding: 12px 10px; text-align: center; font-size: 12px;
}
.att-table td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
.att-table .col-date { text-align: left; padding-left: 16px; font-weight: 500; }
.att-table .at-yes { color: var(--success); font-weight: 700; font-size: 16px; }
.att-table .at-no { color: var(--danger); font-weight: 700; font-size: 16px; }
.att-table .at-empty { color: #d0ccc4; }
.att-table tr:hover td { background: var(--bg); }

/* --- Responsive --- */
@media (max-width: 768px) {
  header, main { padding: 20px 18px; }
  .header-top { flex-direction: column; align-items: flex-start; gap: 16px; }
  .stats-bar { width: 100%; justify-content: flex-start; flex-wrap: wrap; gap: 18px; }
  .member-grid { grid-template-columns: 1fr; }
  .detail-panel { padding: 24px; max-width: 100%; }
  .detail-stats { grid-template-columns: repeat(2, 1fr); }
  .search-box input { width: 140px; }
  .search-box input:focus { width: 180px; }
}
</style>
</head>

// HELPER: categorize member

function category(m) {
  const total = m.awareness + m.homework + m.practice;
  if (total === 0 && m.attendance === 0) return 'unstarted';
  if (total >= 3) return 'active';
  return 'partial';
}
function progressPct(done, total) { return total ? Math.round((done/total)*100) : 0; }
function progressClass(pct) {
  if (pct >= 80) return 'high';
  if (pct >= 40) return 'medium';
  if (pct > 0) return 'low';
  return 'zero';
}

// RENDER: member cards
// ============================================================
const grid = document.getElementById('memberGrid');
let currentFilter = 'all';
let searchQuery = '';

function renderMembers() {
  grid.innerHTML = '';
  let activeCount = 0, inactiveCount = 0, attendedCount = 0;
  MEMBERS.forEach(m => {
    const cat = category(m);
    if (cat === 'active') activeCount++;
    if (cat === 'unstarted') inactiveCount++;
    if (m.attendance > 0) attendedCount++;

    // filter
    if (currentFilter !== 'all' && cat !== currentFilter) return;
    if (searchQuery && !m.name.includes(searchQuery)) return;

    const card = document.createElement('div');
    card.className = `member-card ${cat === 'unstarted' ? 'unstarted' : cat === 'active' ? 'active-member' : 'partial'}`;
    card.onclick = () => showDetail(m);

    const aPct = progressPct(m.awareness, m.awarenessTotal);
    const hPct = progressPct(m.homework, m.homeworkTotal);
    const pPct = progressPct(m.practice, m.practiceTotal);
    const atPct = progressPct(m.attendance, m.shouldAttend);

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-name">${m.name}</div>
          <div class="card-region">${m.region} · ${m.gender === '男' ? '♂' : '♀'} · 推荐人：${m.referee}</div>
        </div>
        <span class="card-badge ${m.isLeader ? 'badge-leader' : 'badge-member'}">${m.isLeader ? '组长' : '组员'}</span>
      </div>
      <div class="progress-section">
        ${makeProgress('每日觉察', m.awareness, m.awarenessTotal, aPct)}
        ${makeProgress('本周作业', m.homework, m.homeworkTotal, hPct)}
        ${makeProgress('每日践行', m.practice, m.practiceTotal, pPct)}
        ${makeProgress('上课出勤', m.attendance, m.shouldAttend, atPct)}
      </div>
      <div style="font-size:12px; color:var(--muted); margin-top:4px;">${m.status}</div>
    `;
    grid.appendChild(card);
  });

  document.getElementById('statActive').textContent = activeCount;
  document.getElementById('statInactive').textContent = inactiveCount;
  const attRate = MEMBERS.length ? Math.round((attendedCount/MEMBERS.length)*100) : 0;
  document.getElementById('statRate').textContent = attRate + '%';
}

function makeProgress(label, done, total, pct) {
  return `
    <div class="progress-row">
      <span class="progress-label">${label}</span>
      <div class="progress-track">
        <div class="progress-fill ${progressClass(pct)}" style="width:${pct}%"></div>
      </div>
      <span class="progress-num">${done}/${total}</span>
    </div>`;
}

// ============================================================
// RENDER: detail panel
// ============================================================
function showDetail(m) {
  const existing = document.querySelector('.detail-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'detail-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const userAssignments = ASSIGNMENTS.filter(a => a.name === m.name).reverse();

  overlay.innerHTML = `
    <div class="detail-panel" style="position:relative;">
      <button class="close-btn" onclick="this.closest('.detail-overlay').remove()">✕</button>
      <h2>${m.name} <span style="font-size:13px;color:var(--muted);font-weight:400;">· ${m.isLeader ? '组长' : '组员'}</span></h2>
      <p class="detail-meta">${m.region} · ${m.referee}</p>
      <div class="detail-stats">
        <div class="detail-stat"><div class="ds-num">${m.awareness}/${m.awarenessTotal}</div><div class="ds-label">每日觉察</div></div>
        <div class="detail-stat"><div class="ds-num">${m.homework}/${m.homeworkTotal}</div><div class="ds-label">本周作业</div></div>
        <div class="detail-stat"><div class="ds-num">${m.practice}/${m.practiceTotal}</div><div class="ds-label">每日践行</div></div>
        <div class="detail-stat"><div class="ds-num">${m.attendance}/${m.shouldAttend}</div><div class="ds-label">上课出勤</div></div>
      </div>
      <div class="detail-assignments">
        <h3>📝 作业记录（${userAssignments.length}条）</h3>
        ${userAssignments.length === 0 ? '<p style="color:var(--muted);font-size:13px;">暂无提交记录</p>' :
          userAssignments.map(a => `
            <div class="assignment-item">
              <div class="ai-date">${a.hwDate} · ${a.note}</div>
              <div class="ai-content">${a.content}</div>
              ${a.feedback ? `<div class="ai-feedback">💡 ${a.feedback}</div>` : ''}
            </div>
          `).join('')
        }
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

// ============================================================
// RENDER: attendance table
// ============================================================
function renderAttendance() {
  const names = MEMBERS.map(m => m.name);
  const headRow = '<tr><th>周次</th><th>日期</th>' + names.map(n => `<th>${n}</th>`).join('') + '</tr>';
  const bodyRows = ATTENDANCE.map(r => {
    const cells = names.map(n => {
      const v = r[n] || '';
      const cls = v === '✓' ? 'at-yes' : v === '✗' ? 'at-no' : 'at-empty';
      return `<td class="${cls}">${v || '-'}</td>`;
    }).join('');
    return `<tr><td>${r.week}</td><td class="col-date">${r.date}</td>${cells}</tr>`;
  }).join('');
  document.getElementById('attTable').innerHTML = headRow + bodyRows;
}

// ============================================================
// FILTERS & SEARCH
// ============================================================
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderMembers();
  });
});
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  renderMembers();
});

// ============================================================
// INIT
// ============================================================
renderMembers();
renderAttendance();
</script>
</body>
</html>
