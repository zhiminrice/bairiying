<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百日营 · 数据导出</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#FBF8F4;padding:16px 16px 100px;max-width:520px;margin:0 auto}
h2{text-align:center;color:#8B5A2B;margin-bottom:14px;font-size:18px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,0.06)}
.card h3{font-size:14px;color:#8B5A2B;margin-bottom:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid #E0D6C8;background:#fff;font-size:12px;cursor:pointer;color:#6B5D4F}
.chip.on{background:#B87333;color:#fff;border-color:#B87333}
.stats{display:flex;gap:6px;margin:8px 0}
.stats div{flex:1;text-align:center;padding:8px 4px;background:#FBF8F4;border-radius:8px}
.stats .n{font-size:20px;font-weight:700;color:#B87333}
.stats .l{font-size:10px;color:#999;margin-top:2px}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:6px}
.btn-go{background:linear-gradient(135deg,#B87333,#D4943A);color:#fff}
.btn-gray{background:#eee;color:#555}
.btn-line{background:#fff;border:1.5px solid #B87333;color:#B87333}
#log{font-size:11px;line-height:1.6;color:#555;white-space:pre-wrap;max-height:200px;overflow-y:auto;background:#FBF8F4;border-radius:8px;padding:8px;margin-top:8px;font-family:monospace}
</style>
</head>
<body>

<h2>📊 导出中心</h2>

<div class="card">
  <h3>🔍 周次</h3>
  <div class="chips" id="wChips"></div>
</div>

<div class="card">
  <h3>📊 数据</h3>
  <div class="stats">
    <div><div class="n" id="nC">--</div><div class="l">云端</div></div>
    <div><div class="n" id="nL">--</div><div class="l">本地</div></div>
    <div><div class="n" id="nM">--</div><div class="l">合并</div></div>
    <div><div class="n" id="nF">--</div><div class="l">筛选</div></div>
  </div>
  <div id="log">加载中...</div>
</div>

<div class="card">
  <button class="btn btn-go" onclick="doExport()">📥 导出 CSV</button>
  <button class="btn btn-line" onclick="refresh()">🔄 刷新数据</button>
  <button class="btn btn-line" onclick="exportAll()">📋 导出全部(无视筛选)</button>
</div>

<div style="text-align:center"><a href="./" style="color:#B87333;font-size:13px;text-decoration:none">← 返回</a></div>

<script>
var SC='https://1430780242-0nq7px6f3u.ap-shanghai.tencentscf.com/submissions';
var LK='submittedLocal';
var cloud=[],local=[],merged=[];
var week='all';

function log(s){var e=document.getElementById('log');e.textContent+=s+'\n';e.scrollTop=e.scrollHeight}

// Build week chips
(function(){
  var h='<span class="chip on" onclick="selW(\"all\",this)">全部</span>';
  for(var i=1;i<=14;i++) h+='<span class="chip" onclick="selW(\"'+i+'\",this)">第'+i+'周</span>';
  document.getElementById('wChips').innerHTML=h;
})();

function selW(v,el){
  document.querySelectorAll('#wChips .chip').forEach(function(c){c.classList.remove('on')});
  el.classList.add('on');week=v;upd();
}

function upd(){
  var f=merged.filter(function(r){
    if(week!=='all'&&String(r.week)!==week)return false;
    return true;
  });
  document.getElementById('nC').textContent=cloud.length;
  document.getElementById('nL').textContent=local.length;
  document.getElementById('nM').textContent=merged.length;
  document.getElementById('nF').textContent=f.length;
}

function refresh(){
  document.getElementById('log').textContent='';
  document.getElementById('nC').textContent='...';
  document.getElementById('nL').textContent='...';
  document.getElementById('nM').textContent='...';
  document.getElementById('nF').textContent='...';
  load();
}

function load(){
  var p1=new Promise(function(ok){
    log('[fetch] 连接 SCF...');
    var x=new XMLHttpRequest();
    x.open('GET',SC+'?t='+Date.now(),true);
    x.timeout=10000;
    x.onload=function(){
      if(x.status===200){
        try{
          var d=JSON.parse(x.responseText);
          cloud=(d.records||[]).map(function(r){
            return{
              name:r['姓名']||'',
              group:r['组别']||'',
              week:parseInt((r['第几周']||'').replace(/[^0-9]/g,''))||0,
              type:r['作业类型']||'',
              content:r['作业内容']||''
            };
          });
          log('[ok] 云端 '+cloud.length+' 条');
        }catch(e){log('[err] JSON解析失败: '+e);cloud=[];}
      }else{
        log('[err] HTTP '+x.status+' '+x.statusText);
        cloud=[];
      }
      ok();
    };
    x.onerror=function(){log('[err] 网络错误');cloud=[];ok();};
    x.ontimeout=function(){log('[err] 超时');cloud=[];ok();};
    x.send();
  });

  var p2=new Promise(function(ok){
    log('[local] 读取 localStorage...');
    try{
      var raw=localStorage.getItem(LK);
      if(raw){
        var arr=JSON.parse(raw);
        local=arr.map(function(s){
          return{name:s.name||'',group:s.group||'',week:s.week||0,type:s.type||'',content:s.content||''};
        });
        log('[ok] 本地 '+local.length+' 条');
      }else{
        log('[warn] localStorage 无数据(键='+LK+')');
        local=[];
      }
    }catch(e){log('[err] '+e);local=[];}
    ok();
  });

  Promise.all([p1,p2]).then(function(){
    // Merge with dedup
    var seen={};merged=[];
    cloud.forEach(function(r){
      if(!r.name||!r.week)return;
      var k=r.name+'|'+r.week+'|'+r.type+'|'+(r.content||'').slice(0,50);
      if(!seen[k]){seen[k]=1;merged.push(Object.assign({src:'cloud'},r));}
    });
    local.forEach(function(r){
      if(!r.name||!r.week)return;
      var k=r.name+'|'+r.week+'|'+r.type+'|'+(r.content||'').slice(0,50);
      if(!seen[k]){seen[k]=1;merged.push(Object.assign({src:'local'},r));}
    });
    log('[merge] 去重后 '+merged.length+' 条');
    upd();
  });
}

function doExport(){
  var f=merged.filter(function(r){
    if(week!=='all'&&String(r.week)!==week)return false;
    return true;
  });
  if(!f.length){alert('无数据：云端='+cloud.length+' 本地='+local.length+' 合并='+merged.length+' 周='+week);return;}
  var h='姓名,组别,周次,类型,来源,内容\n';
  var rows=f.map(function(r){
    return r.name+','+r.group+',第'+r.week+'周,'+r.type+','+r.src+',"'+((r.content||'').replace(/"/g,'""').replace(/\n/g,' '))+'"';
  });
  var b=new Blob(['\uFEFF'+h+rows.join('\n')],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='百日营_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(a.href);
  alert('✅ 导出 '+f.length+' 条');
}

function exportAll(){
  week='all';
  document.querySelectorAll('#wChips .chip').forEach(function(c){c.classList.remove('on')});
  document.querySelector('#wChips .chip').classList.add('on');
  upd();
  setTimeout(doExport,300);
}

load();
</script>
</body>
</html>
