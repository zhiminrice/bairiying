services:
  - type: web
    name: bairiying-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://bairiying.vercel.app
      - key: DATABASE_URL
        sync: false
