<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学员档案 · 百日营</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="desktop.css">
<style>
/* ===== profile.html 页面专属样式 ===== */

/* 搜索框 */
.search-wrap {
  position: relative;
  margin-bottom: var(--space-md);
}

.search-wrap .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--text-muted, var(--color-text-muted));
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 10px 14px 10px 36px;
  border: 1px solid var(--border, var(--color-border));
  border-radius: var(--radius-md);
  background: var(--card-bg, var(--color-card));
  font-size: 14px;
  font-family: inherit;
  color: var(--text, var(--color-text));
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus {
  border-color: var(--copper, var(--color-primary));
}

.search-input::placeholder {
  color: var(--text-muted, var(--color-text-muted));
}

/* 组别筛选 chip 行 */
.filter-chips-row {
  margin-bottom: var(--space-lg);
}

/* 学员卡片 */
.profile-card-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.profile-card {
  background: var(--card-bg, var(--color-card));
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md, var(--shadow-card));
  padding: var(--space-lg);
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.2s ease;
}

.profile-card:active {
  box-shadow: 0 2px 8px rgba(61, 46, 30, 0.1);
}

/* 左侧色条（状态） */
.profile-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.profile-card.status-excellent::before { background: var(--success, #5A9E6F); }
.profile-card.status-started::before  { background: var(--warning, #D4943A); }
.profile-card.status-none::before     { background: var(--danger, #C25B5B); }

/* 卡片头部 */
.profile-card-header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.profile-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--copper-gradient, linear-gradient(135deg, #B87333, #D4943A));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.profile-avatar .avatar-text {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}

.profile-info {
  flex: 1;
  min-width: 0;
}

.profile-name-row {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  margin-bottom: 2px;
  flex-wrap: wrap;
}

.profile-name {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 700;
  color: var(--text, var(--color-text));
}

.profile-meta-row {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  flex-wrap: wrap;
}

/* 角色/状态徽章 */
.badge-role {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  line-height: 1.4;
  white-space: nowrap;
}

.badge-role.leader {
  background: var(--copper-light, #F5E6D3);
  color: var(--copper-dark, #8B5A2B);
}

.badge-role.member {
  background: #F0EBE3;
  color: var(--text-secondary, #7A6B5D);
}

.badge-status {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  line-height: 1.4;
  white-space: nowrap;
}

.badge-status.excellent {
  background: var(--success-light, #EDF5F0);
  color: var(--success, #5A9E6F);
}

.badge-status.started {
  background: var(--warning-light, #FDF3E3);
  color: var(--warning, #D4943A);
}

.badge-status.none {
  background: var(--danger-light, #FCEEEE);
  color: var(--danger, #C25B5B);
}

/* 组别徽章 */
.badge-group-right {
  display: inline-flex;
  align-items: center;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted, var(--color-text-muted));
  border: 1px solid var(--border, var(--color-border));
  background: transparent;
  white-space: nowrap;
  margin-left: auto;
}

/* 四列数据栏 */
.data-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.data-item {
  text-align: center;
  padding: var(--space-sm) var(--space-xs);
  background: #FAF8F5;
  border-radius: var(--radius-sm);
}

.data-item .data-num {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  color: var(--copper, var(--color-primary));
  line-height: 1.2;
}

.data-item .data-num.stat-zero {
  color: var(--text-muted, var(--color-text-muted));
}

.data-item .data-label {
  font-size: 10px;
  color: var(--text-muted, var(--color-text-muted));
  margin-top: 2px;
}

/* 总进度条 */
.total-progress-wrap {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.total-progress-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary, var(--color-text-secondary));
  white-space: nowrap;
  width: 56px;
  flex-shrink: 0;
  text-align: right;
}

.total-progress-bar {
  flex: 1;
  height: 8px;
  background: #F0EBE3;
  border-radius: var(--radius-full);
  overflow: hidden;
}

.total-progress-fill {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width 0.5s ease;
  min-width: 0;
}

.total-progress-fill.green { background: var(--success, #5A9E6F); }
.total-progress-fill.amber { background: var(--warning, #D4943A); }
.total-progress-fill.red   { background: var(--danger, #C25B5B); }

.total-progress-value {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted, var(--color-text-muted));
  white-space: nowrap;
}

/* 结果统计 */
.result-count {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted, var(--color-text-muted));
  padding: var(--space-sm) 0 var(--space-lg);
  font-weight: 500;
}

/* 空态 */
.empty-profile-state {
  text-align: center;
  padding: var(--space-2xl) var(--space-xl);
}

.empty-profile-icon {
  font-size: 48px;
  margin-bottom: var(--space-md);
  opacity: 0.6;
}

.empty-profile-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--text, var(--color-text));
  margin-bottom: var(--space-xs);
}

.empty-profile-desc {
  font-size: 13px;
  color: var(--text-muted, var(--color-text-muted));
}

/* 加载态 */
.profile-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--space-2xl) 0;
}

.profile-loading .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border, var(--color-border));
  border-top-color: var(--copper, var(--color-primary));
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: var(--space-md);
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ===== 桌面端顶部导航 ===== -->
<nav class="desktop-nav">
  <span class="nav-brand">百日营</span>
  <div class="nav-links">
    <a class="nav-link" href="./index.html">总览</a>
    <a class="nav-link" href="./review.html">点评</a>
    <a class="nav-link" href="./submit.html">提交</a>
    <a class="nav-link" href="./attendance.html">出勤</a>
    <a class="nav-link active" href="./profile.html">档案</a>
  </div>
</nav>

<div class="app-container">

  <!-- 页面标题 -->
  <div class="page-header">
    <div class="page-subtitle">Profile · 学员档案</div>
    <div class="page-title">学员档案</div>
  </div>

  <!-- 搜索框 -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput"
           placeholder="搜索学员姓名..." oninput="applyFilters()">
  </div>

  <!-- 组别筛选 chips -->
  <div class="filter-chips-row">
    <div class="chips-scroll" id="filterChips">
      <button class="group-chip active" data-group="all" onclick="selectGroup('all')">全部</button>
    </div>
  </div>

  <!-- 加载态 -->
  <div class="profile-loading" id="profileLoading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--text-muted,var(--color-text-muted));">正在加载学员数据...</div>
  </div>

  <!-- 学员卡片列表 -->
  <div class="profile-card-list" id="profileCardList" style="display:none;"></div>

  <!-- 结果统计 -->
  <div class="result-count" id="resultCount" style="display:none;"></div>

  <!-- 空态 -->
  <div class="empty-profile-state" id="profileEmpty" style="display:none;">
    <div class="empty-profile-icon">👤</div>
    <div class="empty-profile-title">没有匹配的学员</div>
    <div class="empty-profile-desc">请尝试更换筛选条件</div>
  </div>

  <!-- 错误态 -->
  <div class="empty-profile-state" id="profileError" style="display:none;">
    <div class="empty-profile-icon">⚠️</div>
    <div class="empty-profile-title">数据加载异常</div>
    <div class="empty-profile-desc">请检查网络连接后刷新页面</div>
  </div>

</div><!-- /.app-container -->

<!-- ===== 底部 5 Tab 导航栏 ===== -->
<nav class="bottom-nav">
  <a href="./index.html">
    <span class="nav-icon">📊</span>
    <span class="nav-label">总览</span>
  </a>
  <a href="./review.html">
    <span class="nav-icon">📝</span>
    <span class="nav-label">点评</span>
  </a>
  <a href="./submit.html">
    <span class="nav-icon">✍️</span>
    <span class="nav-label">提交</span>
  </a>
  <a href="./attendance.html">
    <span class="nav-icon">📋</span>
    <span class="nav-label">出勤</span>
  </a>
  <a href="./profile.html" class="active">
    <span class="nav-icon">👤</span>
    <span class="nav-label">档案</span>
  </a>

<script>
/* ============================================================
   profile.html — 学员档案页面 JavaScript
   ============================================================ */
var RELAY_URL = 'https://1430780242-0nq7px6f3u.ap-shanghai.tencentscf.com';
var GROUPS = null;
var ATTENDANCE = [];
var ALL_RECORDS = [];
var SCF_AVAILABLE = false;
var CURRENT_FILTER = 'all';
var MEMBER_DATA = [];  /* 处理后的结构化成员数据 */

/* ===== 初始化 ===== */
(function init() {
  loadData();
})();

/* ===== 加载数据 ===== */
function loadData() {
  var groupsP  = fetch('groups.json').then(function(r){ return r.json(); }).catch(function(){ return null; });
  var attP     = fetch('attendance.json').then(function(r){ return r.json(); }).catch(function(){ return []; });
  var scfP     = fetch(RELAY_URL + '/submissions').then(function(r){ return r.json(); }).catch(function(){ return null; });

  Promise.all([groupsP, attP, scfP]).then(function(results){
    GROUPS      = results[0];
    ATTENDANCE  = results[1] || [];
    var scfData = results[2];

    if (GROUPS) {
      buildGroupChips();
    }

    if (scfData && scfData.ok && scfData.records) {
      ALL_RECORDS   = scfData.records;
      SCF_AVAILABLE = true;
    } else {
      ALL_RECORDS   = [];
      SCF_AVAILABLE = false;
    }

    buildMemberData();
    hideLoading();
    applyFilters();
  });
}

/* ===== 构建组别筛选 chips ===== */
function buildGroupChips() {
  var container = document.getElementById('filterChips');
  var groupKeys = Object.keys(GROUPS).sort(function(a,b){
    return parseInt(a) - parseInt(b);
  });
  groupKeys.forEach(function(gk){
    var chip = document.createElement('button');
    chip.className = 'group-chip';
    chip.setAttribute('data-group', gk);
    chip.textContent = gk;
    chip.addEventListener('click', function(){
      selectGroup(gk);
    });
    container.appendChild(chip);
  });
}

/* ===== 切换组别筛选 ===== */
function selectGroup(groupKey) {
  CURRENT_FILTER = groupKey;
  document.querySelectorAll('#filterChips .group-chip').forEach(function(c){
    c.classList.toggle('active', c.getAttribute('data-group') === groupKey);
  });
  applyFilters();
}

/* ===== 构建成员数据 ===== */
function buildMemberData() {
  MEMBER_DATA = [];

  if (!GROUPS) {
    /* 降级：从 attendance 提取姓名 */
    var namesSet = {};
    ATTENDANCE.forEach(function(w){
      Object.keys(w).forEach(function(k){
        if (k !== 'week' && k !== 'weekLabel' && k !== 'date') namesSet[k] = true;
      });
    });
    Object.keys(namesSet).forEach(function(name){
      var s = computeStats(name, '');
      MEMBER_DATA.push(s);
    });
    return;
  }

  Object.keys(GROUPS).forEach(function(gk){
    var g = GROUPS[gk];
    var leader = g.leader || '';
    (g.members || []).forEach(function(name){
      var s = computeStats(name, gk);
      s.isLeader = (name === leader);
      MEMBER_DATA.push(s);
    });
  });
}

/* ===== 计算单个成员统计 ===== */
function computeStats(name, groupKey) {
  /* 出勤（周1-6） */
  var attWeeks = {};
  ATTENDANCE.forEach(function(w){
    if (w.week >= 1 && w.week <= 6) {
      attWeeks[w.week] = (w[name] === 1) ? 1 : 0;
    }
  });
  var attendCount = 0;
  for (var wk = 1; wk <= 6; wk++) {
    if (attWeeks[wk] === 1) attendCount++;
  }

  /* SCF 数据统计 */
  var hwWeeks = {};   /* 本周作业 (按周去重) */
  var awarenessCount = 0;  /* 每日觉察 */
  var practiceCount = 0;   /* 每日践行 */

  ALL_RECORDS.forEach(function(r){
    var f = r.fields || r;
    if (f['姓名'] !== name) return;
    var w = parseInt(f['第几周']) || 0;
    var t = f['作业类型'] || '';

    if (t === '本周作业') {
      hwWeeks[w] = true;
    } else if (t === '每日觉察') {
      awarenessCount++;
    } else if (t === '每日践行') {
      practiceCount++;
    }
  });

  var hwCount = Object.keys(hwWeeks).length;

  /* 状态 */
  var status = 'none';
  var statusLabel = '未开始';
  if (hwCount >= 4) { status = 'excellent'; statusLabel = '优秀'; }
  else if (hwCount >= 1) { status = 'started'; statusLabel = '已起步'; }

  /* 总进度（综合出勤+作业，满分按出勤6+作业6=12计算） */
  var totalProgress = Math.round(((attendCount + hwCount) / 12) * 100);

  return {
    name: name,
    group: groupKey,
    isLeader: false,
    attendCount: attendCount,
    hwCount: hwCount,
    awarenessCount: awarenessCount,
    practiceCount: practiceCount,
    status: status,
    statusLabel: statusLabel,
    totalProgress: totalProgress
  };
}

/* ===== 隐藏加载态 ===== */
function hideLoading() {
  document.getElementById('profileLoading').style.display = 'none';
}

/* ===== 应用筛选 ===== */
function applyFilters() {
  var searchTerm = (document.getElementById('searchInput').value || '').trim().toLowerCase();

  var filtered = MEMBER_DATA.filter(function(m){
    /* 组别筛选 */
    if (CURRENT_FILTER !== 'all' && m.group !== CURRENT_FILTER) return false;
    /* 搜索筛选 */
    if (searchTerm && m.name.toLowerCase().indexOf(searchTerm) === -1) return false;
    return true;
  });

  renderProfiles(filtered);
}

/* ===== 渲染学员卡片列表 ===== */
function renderProfiles(data) {
  var listEl  = document.getElementById('profileCardList');
  var emptyEl = document.getElementById('profileEmpty');
  var errEl   = document.getElementById('profileError');
  var cntEl   = document.getElementById('resultCount');

  if (MEMBER_DATA.length === 0) {
    listEl.style.display = 'none';
    emptyEl.style.display = 'none';
    cntEl.style.display = 'none';
    errEl.style.display = 'block';
    return;
  }

  if (data.length === 0) {
    listEl.style.display = 'none';
    cntEl.style.display = 'none';
    errEl.style.display = 'none';
    emptyEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  emptyEl.style.display = 'none';
  listEl.style.display = 'flex';

  /* 按组排序 */
  data.sort(function(a, b){
    var ga = parseInt(a.group) || 99;
    var gb = parseInt(b.group) || 99;
    if (ga !== gb) return ga - gb;
    return a.name.localeCompare(b.name, 'zh');
  });

  var html = '';
  data.forEach(function(m){
    var initial = m.name ? m.name.charAt(m.name.length - 1) : '?';
    var roleBadge = m.isLeader
      ? '<span class="badge-role leader">组长</span>'
      : '<span class="badge-role member">组员</span>';

    var statusClass = m.status;
    var statusLabel = m.statusLabel;

    var progressColor = 'red';
    if (m.totalProgress >= 60) progressColor = 'green';
    else if (m.totalProgress > 0) progressColor = 'amber';

    var scfNote = '';
    if (!SCF_AVAILABLE) {
      scfNote = '<span style="font-size:10px;color:var(--text-muted,var(--color-text-muted));margin-left:4px;">(仅出勤)</span>';
    }

    /* 零值样式 */
    var hwZero   = m.hwCount === 0 ? ' stat-zero' : '';
    var awZero   = m.awarenessCount === 0 ? ' stat-zero' : '';
    var prZero   = m.practiceCount === 0 ? ' stat-zero' : '';

    html += '<div class="profile-card status-' + statusClass + '">';
    html += '  <div class="profile-card-header">';
    html += '    <div class="profile-avatar"><span class="avatar-text">' + escHtml(initial) + '</span></div>';
    html += '    <div class="profile-info">';
    html += '      <div class="profile-name-row">';
    html += '        <span class="profile-name">' + escHtml(m.name) + '</span>';
    html +=          roleBadge;
    html += '        <span class="badge-status ' + statusClass + '">' + statusLabel + '</span>';
    html += '      </div>';
    html += '      <div class="profile-meta-row">';
    html += '        <span class="text-sm text-muted"' + (m.group ? '' : ' style="display:none"') + '>' + escHtml(m.group) + '</span>';
    html +=            scfNote;
    html += '      </div>';
    html += '    </div>';
    html += '  </div>';

    /* 四列数据 */
    html += '  <div class="data-grid">';
    html += '    <div class="data-item">';
    html += '      <div class="data-num">' + m.attendCount + '/6</div>';
    html += '      <div class="data-label">出勤</div>';
    html += '    </div>';
    html += '    <div class="data-item">';
    html += '      <div class="data-num' + hwZero + '">' + m.hwCount + '/6</div>';
    html += '      <div class="data-label">作业</div>';
    html += '    </div>';
    html += '    <div class="data-item">';
    html += '      <div class="data-num' + awZero + '">' + m.awarenessCount + '天</div>';
    html += '      <div class="data-label">觉察</div>';
    html += '    </div>';
    html += '    <div class="data-item">';
    html += '      <div class="data-num' + prZero + '">' + m.practiceCount + '天</div>';
    html += '      <div class="data-label">践行</div>';
    html += '    </div>';
    html += '  </div>';

    /* 总进度条 */
    html += '  <div class="total-progress-wrap">';
    html += '    <span class="total-progress-label">总进度</span>';
    html += '    <div class="total-progress-bar">';
    html += '      <div class="total-progress-fill ' + progressColor + '" style="width:' + m.totalProgress + '%"></div>';
    html += '    </div>';
    html += '    <span class="total-progress-value">' + m.totalProgress + '%</span>';
    html += '  </div>';

    html += '</div>';
  });

  listEl.innerHTML = html;
  cntEl.style.display = 'block';
  cntEl.textContent = '共 ' + data.length + ' 名学员';
}

/* ===== 辅助函数 ===== */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
