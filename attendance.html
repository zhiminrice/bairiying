<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>百日营 · 出勤记录</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- 品牌设计变量 -->
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="desktop.css">
<style>
/* ====== SHARED RESET & VARIABLES ====== */
:root {
  --bg: #FDFBF7;
  --card: #FFFFFF;
  --text: #2C2824;
  --muted: #8C8580;
  --copper: #B87333;
  --copper-light: #F5ECD7;
  --copper-bg: #FDF5EB;
  --copper-gradient: linear-gradient(135deg, #B87333 0%, #D4994A 100%);
  --success: #4A9C7C;
  --success-bg: #EAF6F1;
  --danger: #C06050;
  --danger-bg: #FDF0ED;
  --border: #E8E4DE;
  --border-light: #F0EDE8;
  --table-header-bg: #F5E6D3;
  --table-header-text: #8B5A2B;
  --row-alt: #FAF5EF;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
  --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.08);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-full: 999px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', 'Noto Serif SC', -apple-system, sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(184,115,51,0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(184,115,51,0.03) 0%, transparent 50%);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding-bottom: 120px;
  position: relative;
}

body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.45;
}

/* ====== MAIN WRAPPER ====== */
.main-wrapper {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 16px 24px;
  position: relative;
  z-index: 1;
}

/* ====== HEADER ====== */
.page-header {
  text-align: center;
  padding: 32px 0 24px;
}
.page-header .subtitle {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.page-header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--copper);
  letter-spacing: 0.04em;
}

/* ====== SECTION LABEL ====== */
.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  margin-top: 4px;
}

/* ====== WEEK SELECTOR (multi-select) ====== */
.week-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.week-chip {
  padding: 8px 16px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1.5px solid var(--border-light);
  background: var(--card);
  color: var(--text);
  transition: var(--transition);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}
.week-chip:hover {
  border-color: var(--copper);
  color: var(--copper);
}
.week-chip.selected {
  border-color: var(--copper);
  background: var(--copper);
  color: #fff;
  font-weight: 600;
}
.week-chip .week-date {
  font-size: 11px;
  opacity: 0.75;
  font-weight: 400;
}
.week-chip.selected .week-date {
  opacity: 0.9;
}

/* Quick actions row */
.quick-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.quick-btn {
  padding: 4px 12px;
  border-radius: var(--radius-full);
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  transition: var(--transition);
}
.quick-btn:hover {
  border-color: var(--copper);
  color: var(--copper);
}

/* ====== GROUP SELECTOR CHIPS ====== */
.group-filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.group-chip {
  padding: 6px 14px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--muted);
  transition: var(--transition);
  white-space: nowrap;
}
.group-chip:hover {
  border-color: var(--copper);
  color: var(--copper);
}
.group-chip.active {
  background: var(--copper-bg);
  border-color: var(--copper);
  color: var(--copper);
  font-weight: 600;
}

/* ====== TABLE CONTAINER ====== */
.table-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 20px;
}
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  max-height: 70vh;
  overflow-y: auto;
}
.table-scroll::-webkit-scrollbar {
  height: 6px;
  width: 6px;
}
.table-scroll::-webkit-scrollbar-track {
  background: transparent;
}
.table-scroll::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* ====== TABLE ====== */
.attendance-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
  table-layout: auto;
}
.attendance-table thead th {
  background: var(--table-header-bg);
  color: var(--table-header-text);
  font-size: 13px;
  font-weight: 700;
  padding: 12px 10px;
  text-align: center;
  border-bottom: 2px solid var(--copper);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 3;
}
.attendance-table thead th.col-name {
  text-align: left;
  min-width: 80px;
  position: sticky;
  left: 0;
  z-index: 5;
  background: var(--table-header-bg);
}
.attendance-table thead th.col-rate {
  position: sticky;
  right: 0;
  z-index: 5;
  background: var(--table-header-bg);
  min-width: 60px;
}
.attendance-table tbody td {
  padding: 10px;
  text-align: center;
  font-size: 14px;
  border-bottom: 1px solid var(--border-light);
  white-space: nowrap;
}
.attendance-table tbody td.col-name {
  text-align: left;
  font-weight: 500;
  position: sticky;
  left: 0;
  z-index: 2;
  background: var(--card);
  min-width: 80px;
}
.attendance-table tbody td.col-rate {
  font-weight: 600;
  position: sticky;
  right: 0;
  z-index: 2;
  background: var(--card);
  min-width: 60px;
}
.attendance-table tbody tr:nth-child(even) td.col-name,
.attendance-table tbody tr:nth-child(even) td.col-rate {
  background: var(--row-alt);
}
.attendance-table tbody tr:nth-child(even) td {
  background: var(--row-alt);
}
.attendance-table tbody tr.summary-row td {
  background: var(--table-header-bg);
  font-weight: 700;
  color: var(--table-header-text);
  border-top: 2px solid var(--copper);
}
.attendance-table tbody tr.summary-row td.col-name,
.attendance-table tbody tr.summary-row td.col-rate {
  background: var(--table-header-bg);
}

/* Attendance marks */
.att-yes {
  color: var(--success);
  font-size: 16px;
  font-weight: 700;
}
.att-no {
  color: var(--danger);
  font-size: 14px;
}
.leader-star {
  color: var(--copper);
  font-size: 13px;
  margin-left: 2px;
}

/* Rate color coding */
.rate-high { color: var(--success); }
.rate-mid { color: #C4944A; }
.rate-low { color: var(--danger); }

/* Group divider row */
.group-divider td {
  padding: 6px 10px !important;
  background: var(--copper-bg) !important;
  font-size: 12px !important;
  font-weight: 600 !important;
  color: var(--copper) !important;
  letter-spacing: 0.04em;
}

/* ====== BOTTOM STATS ====== */
.stats-footer {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 20px;
}
.stats-footer .stats-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}
.stats-row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  margin-bottom: 10px;
}
.stats-number {
  font-size: 28px;
  font-weight: 700;
  color: var(--copper);
  line-height: 1;
}
.stats-percent {
  font-size: 18px;
  font-weight: 600;
  color: var(--muted);
}
.stats-detail {
  font-size: 13px;
  color: var(--muted);
}
.progress-bar-wrap {
  width: 100%;
  height: 8px;
  background: var(--border-light);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.progress-bar-fill.high { background: var(--success); }
.progress-bar-fill.mid { background: var(--copper); }
.progress-bar-fill.low { background: var(--danger); }

/* ====== BOTTOM TAB BAR ====== */
.bottom-tab-bar {
  display: flex;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 6px 0 env(safe-area-inset-bottom, 0);
  max-width: 720px;
  margin: 0 auto;
}
.bottom-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 6px 4px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--muted);
  transition: var(--transition);
  text-decoration: none;
  font-size: 11px;
  font-weight: 500;
}
.bottom-tab .tab-icon {
  font-size: 20px;
  line-height: 1;
}
.bottom-tab.active {
  color: var(--copper);
}
.bottom-tab:hover {
  color: var(--copper);
}

/* ====== LOADING SPINNER ====== */
.loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(253,251,247,0.7);
  backdrop-filter: blur(2px);
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--copper);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ====== EMPTY STATE ====== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 14px;
}

/* ====== RESPONSIVE ====== */
@media (max-width: 480px) {
  .main-wrapper {
    padding: 0 12px 24px;
  }
  .page-header {
    padding: 24px 0 20px;
  }
  .page-header h1 {
    font-size: 22px;
  }
  .attendance-table thead th,
  .attendance-table tbody td {
    padding: 8px 6px;
    font-size: 12px;
  }
  .att-yes { font-size: 14px; }
  .stats-number { font-size: 24px; }
}
</style>
</head>

      <a href="./profile.html" class="nav-link">👤 档案</a>
    </div>
  </nav>


<!-- MAIN WRAPPER -->
<div class="main-wrapper">

  <!-- HEADER -->
  <div class="page-header">
    <p class="subtitle">百日营 · 出勤记录</p>
    <h1>出勤记录</h1>
  </div>

  <!-- WEEK SELECTOR -->
  <div class="section-label">选择周次（可多选）</div>
  <div class="quick-actions">
    <button class="quick-btn" onclick="selectAllWeeks()">全选</button>
    <button class="quick-btn" onclick="clearAllWeeks()">清空</button>
    <button class="quick-btn" onclick="selectLatestWeek()">仅最新</button>
  </div>
  <div class="week-selector" id="weekSelector">
    <!-- dynamically populated -->
  </div>

  <div class="section-label">选择组别</div>

    <!-- dynamically populated -->
  </div>

  <div class="table-card" id="tableCard">
    <div class="table-scroll">
      <table class="attendance-table" id="attendanceTable">
        <!-- dynamically populated -->
      </table>
    </div>

      请选择周次和组别查看出勤记录
    </div>
  </div>

  <!-- STATS FOOTER -->
  <div class="stats-footer" id="statsFooter">
    <div class="stats-title" id="statsTitle">全营 · 出勤统计</div>
    <div class="stats-row">
      <span class="stats-number" id="statsAttended">--</span>
      <span class="stats-percent" id="statsPercent">--</span>
      <span class="stats-detail" id="statsDetail">--</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill high" id="progressBar" style="width: 0%;"></div>
    </div>
  </div>

</div>

<!-- BOTTOM TAB BAR -->
<nav class="bottom-tab-bar">

    <span class="tab-icon">📊</span>

  </a>
  <a class="bottom-tab" href="index.html?tab=review">

  </a>
</nav>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay" style="display:none;">
  <div class="spinner"></div>
</div>

<script>
// ====== STATE ======
var attendanceData = [];
var groupsData = {};
var allMembers = [];        // { name, group, isLeader }
var selectedWeeks = new Set();
var selectedGroup = 'all';

// ====== LOADING ======
function showLoading() { document.getElementById('loadingOverlay').style.display = 'flex'; }
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

// ====== LOAD DATA ======
function loadData() {
  showLoading();
  Promise.all([
    fetch('attendance.json').then(function(r) { return r.json(); }),
    fetch('groups.json').then(function(r) { return r.json(); })
  ])
    .then(function(results) {
      attendanceData = results[0];
      groupsData = results[1];

      // Build flat member list from groups
      allMembers = [];
      var groupKeys = Object.keys(groupsData).sort(function(a, b) {
        return parseInt(a) - parseInt(b);
      });
      groupKeys.forEach(function(gk) {
        var g = groupsData[gk];
        g.members.forEach(function(m) {
          allMembers.push({
            name: m,
            group: gk,
            isLeader: m === g.leader
          });
        });
      });

      // Default: select latest week
      if (attendanceData.length > 0) {
        var latest = attendanceData[attendanceData.length - 1];
        selectedWeeks.add(latest.week);
      }

      renderWeekSelector();
      renderGroupChips();
      renderTable();
      updateStats();
      hideLoading();
    })
    .catch(function(err) {
      hideLoading();
      console.error('加载数据失败: ' + err.message);
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').textContent = '加载数据失败: ' + err.message;
    });
}

// ====== RENDER WEEK SELECTOR ======
function renderWeekSelector() {
  var container = document.getElementById('weekSelector');
  var html = '';
  attendanceData.forEach(function(w) {
    var isSelected = selectedWeeks.has(w.week);
    var cls = 'week-chip' + (isSelected ? ' selected' : '');
    html += '<button class="' + cls + '" data-week="' + w.week + '" onclick="toggleWeek(' + w.week + ')">'
      + w.weekLabel + ' <span class="week-date">' + w.date + '</span>'
      + '</button>';
  });
  container.innerHTML = html;
}

function toggleWeek(weekNum) {
  if (selectedWeeks.has(weekNum)) {
    selectedWeeks.delete(weekNum);
  } else {
    selectedWeeks.add(weekNum);
  }
  renderWeekSelector();
  renderTable();
  updateStats();
}

function selectAllWeeks() {
  attendanceData.forEach(function(w) { selectedWeeks.add(w.week); });
  renderWeekSelector();
  renderTable();
  updateStats();
}

function clearAllWeeks() {
  selectedWeeks.clear();
  renderWeekSelector();
  renderTable();
  updateStats();
}

function selectLatestWeek() {
  selectedWeeks.clear();
  if (attendanceData.length > 0) {
    selectedWeeks.add(attendanceData[attendanceData.length - 1].week);
  }
  renderWeekSelector();
  renderTable();
  updateStats();
}

// ====== RENDER GROUP CHIPS ======
function renderGroupChips() {
  var container = document.getElementById('groupFilterChips');
  var groupKeys = Object.keys(groupsData).sort(function(a, b) {
    return parseInt(a) - parseInt(b);
  });
  var html = '<button class="group-chip active" data-group="all" onclick="selectGroup(\'all\')">全部</button>';
  groupKeys.forEach(function(gk) {
    var count = groupsData[gk].members.length;
    html += '<button class="group-chip" data-group="' + gk + '" onclick="selectGroup(\'' + gk + '\')">'
      + gk + '(' + count + '人)</button>';
  });
  container.innerHTML = html;
}

function selectGroup(group) {
  selectedGroup = group;
  // Update chip active states
  var chips = document.getElementById('groupFilterChips').querySelectorAll('.group-chip');
  chips.forEach(function(c) {
    c.classList.remove('active');
    if (c.getAttribute('data-group') === group) {
      c.classList.add('active');
    }
  });
  renderTable();
  updateStats();
}

// ====== RENDER TABLE ======
function renderTable() {
  var tableEl = document.getElementById('attendanceTable');
  var emptyState = document.getElementById('emptyState');

  if (selectedWeeks.size === 0) {
    tableEl.innerHTML = '';
    emptyState.style.display = 'block';
    emptyState.textContent = '请选择至少一个周次查看出勤记录';
    return;
  }

  emptyState.style.display = 'none';

  // Get selected week objects, sorted by week number
  var selWeeks = attendanceData
    .filter(function(w) { return selectedWeeks.has(w.week); })
    .sort(function(a, b) { return a.week - b.week; });

  // Filter members by selected group
  var members;
  if (selectedGroup === 'all') {
    members = allMembers.slice();
  } else {
    members = allMembers.filter(function(m) { return m.group === selectedGroup; });
  }

  // Build table HTML
  var html = '<thead><tr>';
  html += '<th class="col-name">姓名</th>';
  selWeeks.forEach(function(w) {
    html += '<th>' + w.weekLabel + '<br><span style="font-weight:400;font-size:11px;">' + w.date + '</span></th>';
  });
  html += '<th class="col-rate">出勤率</th>';
  html += '</tr></thead><tbody>';

  // Group members by group for divider rows
  var currentGroup = null;
  members.forEach(function(m, idx) {
    // Insert group divider when group changes
    if (m.group !== currentGroup && selectedGroup === 'all') {
      currentGroup = m.group;
      var gData = groupsData[currentGroup];
      var gCount = gData ? gData.members.length : 0;
      html += '<tr class="group-divider"><td colspan="' + (selWeeks.length + 2) + '">'
        + currentGroup + '（组长：' + (gData ? gData.leader : '--') + ' | ' + gCount + '人）</td></tr>';
    }

    var rowClass = (idx % 2 === 0) ? '' : ' class="alt"';
    html += '<tr' + rowClass + '>';

    // Name column with leader star
    var nameHtml = m.name;
    if (m.isLeader) {
      nameHtml += ' <span class="leader-star">&#9733;</span>';
    }
    html += '<td class="col-name">' + nameHtml + '</td>';

    // Attendance marks for each selected week
    var totalWeeks = 0;
    var attendedWeeks = 0;
    selWeeks.forEach(function(w) {
      var val = w[m.name];
      totalWeeks++;
      if (val === 1) {
        html += '<td><span class="att-yes">&check;</span></td>';
        attendedWeeks++;
      } else if (val === 0) {
        html += '<td><span class="att-no">&cross;</span></td>';
      } else {
        html += '<td><span style="color:var(--muted);">--</span></td>';
      }
    });

    // Attendance rate
    var rate = totalWeeks > 0 ? Math.round(attendedWeeks / totalWeeks * 100) : 0;
    var rateClass = rate >= 80 ? 'rate-high' : (rate >= 50 ? 'rate-mid' : 'rate-low');
    html += '<td class="col-rate ' + rateClass + '">' + rate + '%</td>';
    html += '</tr>';
  });

  // Summary row
  if (members.length > 0) {
    html += '<tr class="summary-row">';
    html += '<td class="col-name">汇总</td>';
    var totalAll = 0;
    var attendedAll = 0;
    selWeeks.forEach(function(w) {
      var weekAttended = 0;
      var weekTotal = 0;
      members.forEach(function(m) {
        var val = w[m.name];
        if (val !== undefined) {
          weekTotal++;
          totalAll++;
          if (val === 1) {
            weekAttended++;
            attendedAll++;
          }
        }
      });
      var weekRate = weekTotal > 0 ? Math.round(weekAttended / weekTotal * 100) : 0;
      html += '<td>' + weekAttended + '/' + weekTotal + ' (' + weekRate + '%)</td>';
    });
    var avgRate = totalAll > 0 ? Math.round(attendedAll / totalAll * 100) : 0;
    html += '<td class="col-rate">' + avgRate + '%</td>';
    html += '</tr>';
  }

  html += '</tbody>';
  tableEl.innerHTML = html;
}

// ====== UPDATE STATS ======
function updateStats() {
  if (selectedWeeks.size === 0 || allMembers.length === 0) {
    document.getElementById('statsAttended').textContent = '--';
    document.getElementById('statsPercent').textContent = '--';
    document.getElementById('statsDetail').textContent = '请选择周次';
    document.getElementById('progressBar').style.width = '0%';
    return;
  }

  var selWeeks = attendanceData.filter(function(w) { return selectedWeeks.has(w.week); });
  var members = (selectedGroup === 'all')
    ? allMembers
    : allMembers.filter(function(m) { return m.group === selectedGroup; });

  var totalAll = 0;
  var attendedAll = 0;
  selWeeks.forEach(function(w) {
    members.forEach(function(m) {
      var val = w[m.name];
      if (val !== undefined) {
        totalAll++;
        if (val === 1) attendedAll++;
      }
    });
  });

  var avgRate = totalAll > 0 ? Math.round(attendedAll / totalAll * 100) : 0;

  // Stats title
  var title;
  if (selectedGroup === 'all') {
    title = '全营 · 出勤统计';
  } else {
    title = selectedGroup + ' · 出勤统计';
  }
  if (selWeeks.length === 1) {
    title += '（' + selWeeks[0].weekLabel + '）';
  } else {
    title += '（' + selWeeks.length + '周汇总）';
  }
  document.getElementById('statsTitle').textContent = title;
  document.getElementById('statsAttended').textContent = attendedAll + '/' + totalAll;
  document.getElementById('statsPercent').textContent = avgRate + '%';
  document.getElementById('statsDetail').textContent =
    '共 ' + members.length + ' 人，' + selWeeks.length + ' 周统计';

  // Progress bar
  var bar = document.getElementById('progressBar');
  bar.style.width = avgRate + '%';
  bar.className = 'progress-bar-fill ' + (avgRate >= 80 ? 'high' : (avgRate >= 50 ? 'mid' : 'low'));
}

// ====== INIT ======
loadData();
</script>
