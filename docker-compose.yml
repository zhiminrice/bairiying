version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bairiying-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bairiying
      POSTGRES_USER: bairiying
      POSTGRES_PASSWORD: bairiying123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bairiying -d bairiying"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bairiying-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://bairiying:bairiying123@postgres:5432/bairiying
      JWT_SECRET: ${JWT_SECRET:-bairiying-production-change-this-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./backups:/app/backups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    container_name: bairiying-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
