<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>导师点评 · 百日营</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="desktop.css">
<style>
/* ===== review.html 页面专属样式 ===== */

/* 周选择器容器 */
.week-selector-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
  flex-wrap: wrap;
}

/* 点评统计行 */
.review-stats-row {
  display: flex;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}

.review-stat-item {
  flex: 1;
  background: var(--card-bg, var(--color-card));
  border-radius: var(--radius-md);
  padding: var(--space-sm) var(--space-md);
  text-align: center;
  box-shadow: var(--shadow-sm, var(--shadow-card));
}

.review-stat-item .num {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 700;
  color: var(--copper, var(--color-primary));
  line-height: 1.2;
}

.review-stat-item .lbl {
  font-size: 11px;
  color: var(--text-muted, var(--color-text-muted));
  margin-top: 2px;
}

/* 点评卡片 */
.review-card-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.review-card {
  background: var(--card-bg, var(--color-card));
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md, var(--shadow-card));
  padding: var(--space-lg);
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.2s ease;
}

.review-card:active {
  box-shadow: 0 2px 8px rgba(61, 46, 30, 0.1);
}

/* 左侧色条 */
.review-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

.review-card.type-作业::before { background: var(--copper, var(--color-primary)); }
.review-card.type-分享::before { background: var(--success, #5A9E6F); }
.review-card.type-答疑::before { background: var(--copper-dark, #8B5A2B); }

/* 点评卡片头部 */
.review-card-header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}

.review-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--copper, var(--color-primary));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.review-avatar .avatar-text {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}

.review-meta {
  flex: 1;
  min-width: 0;
}

.review-name-row {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  margin-bottom: 2px;
}

.review-name {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 700;
  color: var(--text, var(--color-text));
}

.review-date {
  font-size: 11px;
  color: var(--text-muted, var(--color-text-muted));
  margin-left: auto;
  flex-shrink: 0;
}

.review-tags {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  flex-wrap: wrap;
}

/* 类型标签 */
.type-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 600;
  line-height: 1.4;
  white-space: nowrap;
}

.type-tag.本周作业 {
  background: var(--copper-light, #F5E6D3);
  color: var(--copper-dark, #8B5A2B);
}

.type-tag.本周分享 {
  background: var(--success-light, #EDF5F0);
  color: var(--success, #5A9E6F);
}

.type-tag.学员答疑 {
  background: #EDF0F5;
  color: var(--copper-dark, #8B5A2B);
}

/* 组别徽章 */
.group-badge-sm {
  display: inline-flex;
  align-items: center;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted, var(--color-text-muted));
  border: 1px solid var(--border, var(--color-border));
  background: transparent;
  white-space: nowrap;
}

/* 点评正文 */
.review-body {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text, var(--color-text));
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: var(--space-md);
}

/* 星级评分 */
.review-stars {
  display: flex;
  gap: 2px;
  align-items: center;
}

.review-stars .star {
  font-size: 16px;
  color: var(--copper-light, #E8DFD4);
  line-height: 1;
}

.review-stars .star.filled {
  color: var(--copper, #D4943A);
}

/* 周次标签 */
.week-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  font-size: 12px;
  font-weight: 600;
  background: var(--copper-light, var(--color-primary-light));
  color: var(--copper-dark, var(--color-primary-deep));
  margin-right: auto;
}

/* 空态 */
.empty-review-state {
  text-align: center;
  padding: var(--space-2xl) var(--space-xl);
}

.empty-review-icon {
  font-size: 48px;
  margin-bottom: var(--space-md);
  opacity: 0.6;
}

.empty-review-title {
  font-family: var(--font-serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--text, var(--color-text));
  margin-bottom: var(--space-xs);
}

.empty-review-desc {
  font-size: 13px;
  color: var(--text-muted, var(--color-text-muted));
}

/* 加载态 */
.review-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--space-2xl) 0;
}

.review-loading .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border, var(--color-border));
  border-top-color: var(--copper, var(--color-primary));
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-bottom: var(--space-md);
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ===== 桌面端顶部导航 ===== -->
<nav class="desktop-nav">
  <span class="nav-brand">百日营</span>
  <div class="nav-links">

    <a class="nav-link active" href="./review.html">点评</a>
    <a class="nav-link" href="./submit.html">提交</a>

</nav>

<div class="app-container">

  <!-- 页面标题 -->
  <div class="page-header">
    <div class="page-subtitle">Review · 导师点评</div>
    <div class="page-title">导师点评</div>
  </div>

  <!-- 周选择器 -->
  <div class="week-selector-row" id="weekSelector">
    <span style="font-size:13px;font-weight:600;color:var(--text-muted,var(--color-text-muted));margin-right:4px;">选择周次</span>
  </div>

  <!-- 统计行 -->
  <div class="review-stats-row" id="reviewStats">
    <div class="review-stat-item">
      <div class="num" id="statTotal">-</div>
      <div class="lbl">点评总数</div>
    </div>
    <div class="review-stat-item">
      <div class="num" id="statHomework">-</div>
      <div class="lbl">本周作业</div>
    </div>
    <div class="review-stat-item">
      <div class="num" id="statShare">-</div>
      <div class="lbl">本周分享</div>
    </div>
    <div class="review-stat-item">
      <div class="num" id="statQa">-</div>
      <div class="lbl">学员答疑</div>
    </div>
  </div>

  <!-- 加载态 -->
  <div class="review-loading" id="reviewLoading">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--text-muted,var(--color-text-muted));">正在加载点评数据...</div>
  </div>

  <!-- 点评卡片列表 -->
  <div class="review-card-list" id="reviewCardList" style="display:none;"></div>

  <!-- 空态 -->
  <div class="empty-review-state" id="reviewEmpty" style="display:none;">
    <div class="empty-review-icon">📝</div>
    <div class="empty-review-title" id="emptyTitle">暂无点评数据</div>
    <div class="empty-review-desc" id="emptyDesc">该周还没有作业、分享或答疑记录</div>
  </div>

  <!-- 错误态 -->
  <div class="empty-review-state" id="reviewError" style="display:none;">
    <div class="empty-review-icon">⚠️</div>
    <div class="empty-review-title">数据加载失败</div>
    <div class="empty-review-desc">SCF 服务暂时不可用，请稍后重试</div>
  </div>

</div><!-- /.app-container -->

<script>
/* ============================================================
   review.html — 导师点评页面 JavaScript
   ============================================================ */
var RELAY_URL = 'https://1430780242-0nq7px6f3u.ap-shanghai.tencentscf.com';
var GROUPS = null;
var ALL_RECORDS = [];
var CURRENT_WEEK = 6;
var MAX_WEEK = 6;

/* ===== 初始化 ===== */
(function init() {
  buildWeekSelector();
  loadData();
})();

/* ===== 构建周选择器 ===== */
function buildWeekSelector() {
  var sel = document.getElementById('weekSelector');
  for (var w = 1; w <= MAX_WEEK; w++) {
    var chip = document.createElement('button');
    chip.className = 'week-chip' + (w === CURRENT_WEEK ? ' active' : '');
    chip.textContent = '第' + w + '周';
    chip.setAttribute('data-week', w);
    chip.addEventListener('click', function() {
      CURRENT_WEEK = parseInt(this.getAttribute('data-week'));
      document.querySelectorAll('.week-chip').forEach(function(c) { c.classList.remove('active'); });
      this.classList.add('active');
      renderReviews();
    });
    sel.appendChild(chip);
  }
}

/* ===== 加载数据 ===== */
function loadData() {
  var groupsPromise = fetch('groups.json')
    .then(function(r) { return r.json(); })
    .catch(function() { return null; });

  var scfPromise = fetch(RELAY_URL + '/submissions')
    .then(function(r) { return r.json(); })
    .catch(function() { return null; });

  Promise.all([groupsPromise, scfPromise]).then(function(results) {
    GROUPS = results[0];
    var scfData = results[1];

    if (scfData && scfData.ok && scfData.records) {
      ALL_RECORDS = scfData.records;
      MAX_WEEK = computeMaxWeek(ALL_RECORDS);
      rebuildWeekSelector();
    } else {
      ALL_RECORDS = [];
    }

    hideLoading();
    renderReviews();
  });
}

/* ===== 计算最大周次 ===== */
function computeMaxWeek(records) {
  var max = 6;
  records.forEach(function(r) {
    var f = r.fields || r;
    var w = parseInt(f['第几周']) || 0;
    if (w > max) max = w;
  });
  return max;
}

/* ===== 重建周选择器 ===== */
function rebuildWeekSelector() {
  var sel = document.getElementById('weekSelector');
  while (sel.children.length > 1) { sel.removeChild(sel.lastChild); }
  for (var w = 1; w <= MAX_WEEK; w++) {
    var chip = document.createElement('button');
    chip.className = 'week-chip' + (w === CURRENT_WEEK ? ' active' : '');
    chip.textContent = '第' + w + '周';
    chip.setAttribute('data-week', w);
    (function(week) {
      chip.addEventListener('click', function() {
        CURRENT_WEEK = week;
        document.querySelectorAll('.week-chip').forEach(function(c) { c.classList.remove('active'); });
        this.classList.add('active');
        renderReviews();
      });
    })(w);
    sel.appendChild(chip);
  }
}

/* ===== 隐藏加载态 ===== */
function hideLoading() {
  document.getElementById('reviewLoading').style.display = 'none';
}

/* ===== 渲染点评列表 ===== */
function renderReviews() {
  var listEl = document.getElementById('reviewCardList');
  var emptyEl = document.getElementById('reviewEmpty');
  var errEl = document.getElementById('reviewError');

  /* 过滤：指定周次 + 三种类型 */
  var typeMap = { '本周作业': '作业', '本周分享': '分享', '学员答疑': '答疑' };
  var filtered = [];
  ALL_RECORDS.forEach(function(r) {
    var f = r.fields || r;
    var w = parseInt(f['第几周']) || 0;
    if (w !== CURRENT_WEEK) return;
    var t = f['作业类型'] || '';
    if (!typeMap[t]) return;
    var group = f['组别'] || '';
    if (!group) {
      /* 尝试通过姓名从 GROUPS 查找 */
      var name = f['姓名'] || '';
      group = findGroup(name);
    }
    filtered.push({
      record_id: r._record_id || '',
      name: f['姓名'] || '未知',
      group: group,
      week: w,
      type: t,
      typeKey: typeMap[t],
      content: f['作业内容'] || '',
      created: f['创建时间'] || r.created_time || ''
    });
  });

  /* 更新统计 */
  document.getElementById('statTotal').textContent = filtered.length;
  var hw = filtered.filter(function(x) { return x.type === '本周作业'; }).length;
  var sh = filtered.filter(function(x) { return x.type === '本周分享'; }).length;
  var qa = filtered.filter(function(x) { return x.type === '学员答疑'; }).length;
  document.getElementById('statHomework').textContent = hw;
  document.getElementById('statShare').textContent = sh;
  document.getElementById('statQa').textContent = qa;

  /* 空态 */
  if (filtered.length === 0) {
    listEl.style.display = 'none';
    errEl.style.display = 'none';
    if (ALL_RECORDS.length === 0) {
      emptyEl.style.display = 'block';
      document.getElementById('emptyTitle').textContent = '暂无点评数据';
      document.getElementById('emptyDesc').textContent = 'SCF API 暂不可用，数据加载失败';
    } else {
      emptyEl.style.display = 'block';
      document.getElementById('emptyTitle').textContent = '第' + CURRENT_WEEK + '周暂无点评';
      document.getElementById('emptyDesc').textContent = '该周还没有作业、分享或答疑记录';
    }
    return;
  }

  emptyEl.style.display = 'none';
  errEl.style.display = 'none';
  listEl.style.display = 'flex';

  /* 构建HTML */
  var html = '';
  filtered.forEach(function(item) {
    var initial = item.name ? item.name.charAt(item.name.length - 1) : '?';
    var dateStr = item.created ? formatDate(item.created) : '';
    var starCount = starRating(item.type, item.content);
    var typeClass = 'type-' + item.typeKey;

    html += '<div class="review-card ' + typeClass + '">';
    html += '  <div class="review-card-header">';
    html += '    <div class="review-avatar"><span class="avatar-text">' + escHtml(initial) + '</span></div>';
    html += '    <div class="review-meta">';
    html += '      <div class="review-name-row">';
    html += '        <span class="review-name">' + escHtml(item.name) + '</span>';
    if (item.group) {
      html += '        <span class="group-badge-sm">' + escHtml(item.group) + '</span>';
    }
    if (dateStr) {
      html += '        <span class="review-date">' + escHtml(dateStr) + '</span>';
    }
    html += '      </div>';
    html += '      <div class="review-tags">';
    html += '        <span class="type-tag ' + escHtml(item.type) + '">' + escHtml(item.type) + '</span>';
    html += '      </div>';
    html += '    </div>';
    html += '  </div>';
    html += '  <div class="review-body">' + escHtmlPreview(item.content, 300) + '</div>';
    html += '  <div class="review-stars">' + buildStarHtml(starCount) + '</div>';
    html += '</div>';
  });

  listEl.innerHTML = html;
}

/* ===== 辅助函数 ===== */
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escHtmlPreview(s, maxLen) {
  var escaped = escHtml(s);
  if (escaped.length > maxLen) {
    escaped = escaped.substring(0, maxLen).replace(/\s+\S*$/, '') + '...';
  }
  return escaped.replace(/\n/g, '<br>');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) {
      var m = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (m) return m[2] + '/' + m[3];
      return dateStr.length > 10 ? dateStr.substring(0, 10) : dateStr;
    }
    return (d.getMonth() + 1) + '/' + d.getDate();
  } catch(e) { return ''; }
}

function starRating(type, content) {
  /* 基于内容长度给一个基础的星级（模拟导师评分逻辑） */
  var len = (content || '').length;
  if (len >= 500) return 5;
  if (len >= 300) return 4;
  if (len >= 150) return 4;
  if (len >= 80) return 3;
  if (len > 0) return 3;
  return 3;
}

function buildStarHtml(count) {
  var h = '';
  for (var i = 0; i < 5; i++) {
    h += '<span class="star' + (i < count ? ' filled' : '') + '">★</span>';
  }
  return h;
}

function findGroup(name) {
  if (!GROUPS) return '';
  for (var g in GROUPS) {
    if (!GROUPS.hasOwnProperty(g)) continue;
    var m = GROUPS[g].members || [];
    if (m.indexOf(name) !== -1) return g;
  }
  return '';
}
</script>
