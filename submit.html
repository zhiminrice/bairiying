<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
/* ====== SHARED RESET & VARIABLES ====== */
:root {
  --bg: #FDFBF7;
  --card: #FFFFFF;
  --text: #2C2824;
  --muted: #8C8580;
  --copper: #B87333;
  --copper-light: #F5ECD7;
  --copper-bg: #FDF5EB;
  --copper-gradient: linear-gradient(135deg, #B87333 0%, #D4994A 100%);
  --copper-hover: #A0612B;
  --success: #4A9C7C;
  --success-bg: #EAF6F1;
  --danger: #C06050;
  --danger-bg: #FDF0ED;
  --border: #E8E4DE;
  --border-light: #F0EDE8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
  --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.08);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-full: 999px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', 'Noto Serif SC', -apple-system, sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(184,115,51,0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(184,115,51,0.03) 0%, transparent 50%);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding-bottom: 100px;
  position: relative;
}

/* Paper grain overlay */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.45;
}

/* ====== MAIN WRAPPER ====== */
.main-wrapper {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 20px 24px;
  position: relative;
  z-index: 1;
}

/* ====== HEADER ====== */
.page-header {
  text-align: center;
  padding: 32px 0 24px;
}
.page-header .subtitle {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.page-header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--copper);
  letter-spacing: 0.04em;
}

/* ====== STEP INDICATOR ====== */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 28px;
  padding: 0 8px;
}
.step-item {
  display: flex;
  align-items: center;
  gap: 0;
}
.step-circle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  transition: var(--transition);
  flex-shrink: 0;
}
.step-circle.done {
  background: var(--success);
  color: #fff;
}
.step-circle.current {
  background: var(--copper);
  color: #fff;
  box-shadow: 0 0 0 4px rgba(184,115,51,0.15);
}
.step-circle.future {
  background: #EAE6E0;
  color: #B5B0AA;
}
.step-label {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  text-align: center;
}
.step-label.active {
  color: var(--copper);
  font-weight: 600;
}
.step-label.done-label {
  color: var(--success);
  font-weight: 500;
}
.step-connector {
  width: 36px;
  height: 2px;
  background: #EAE6E0;
  margin: 0 4px;
  transition: var(--transition);
}
.step-connector.done {
  background: var(--success);
}
.step-connector.current {
  background: var(--copper);
}
.step-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

/* ====== SEARCH BOX ====== */
.search-box {
  position: relative;
  margin-bottom: 20px;
}
.search-box input {
  width: 100%;
  padding: 12px 44px 12px 20px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-full);
  font-size: 15px;
  font-family: inherit;
  background: var(--card);
  color: var(--text);
  transition: var(--transition);
  outline: none;
}
.search-box input:focus {
  border-color: var(--copper);
  box-shadow: 0 0 0 3px rgba(184,115,51,0.1);
}
.search-box input::placeholder {
  color: #BFB8B0;
}
.search-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--muted);
  pointer-events: none;
}

/* ====== GROUP FILTER CHIPS ====== */
.group-filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.group-chip {
  padding: 6px 14px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--muted);
  transition: var(--transition);
  white-space: nowrap;
}
.group-chip:hover {
  border-color: var(--copper);
  color: var(--copper);
}
.group-chip.active {
  background: var(--copper-bg);
  border-color: var(--copper);
  color: var(--copper);
  font-weight: 600;
}

/* ====== STUDENT GRID ====== */
.student-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 24px;
  max-height: 240px;
  overflow-y: auto;
}
.student-card {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1.5px solid var(--border-light);
  background: var(--card);
  color: var(--text);
  transition: var(--transition);
  text-align: center;
  position: relative;
}
.student-card:hover {
  border-color: var(--copper);
  background: var(--copper-bg);
}
.student-card.selected {
  border-color: var(--copper);
  background: var(--copper-bg);
  color: var(--copper);
  font-weight: 600;
  box-shadow: 0 0 0 2px rgba(184,115,51,0.15);
}
.student-card.selected::after {
  content: '✓';
  position: absolute;
  top: 6px;
  right: 10px;
  font-size: 12px;
  color: var(--copper);
  font-weight: 700;
}
.student-card .leader-star {
  font-size: 11px;
  color: var(--copper);
  margin-left: 2px;
}

/* ====== FORM SECTION TITLES ====== */
.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  margin-top: 4px;
}

/* ====== TYPE CHIPS ====== */
.type-chips {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 24px;
}
.type-chip {
  padding: 10px 8px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1.5px solid var(--border-light);
  background: var(--card);
  color: var(--text);
  transition: var(--transition);
  text-align: center;
}
.type-chip:hover {
  border-color: var(--copper);
  color: var(--copper);
}
.type-chip.selected {
  border-color: var(--copper);
  background: var(--copper-bg);
  color: var(--copper);
  font-weight: 600;
  box-shadow: 0 0 0 2px rgba(184,115,51,0.12);
}

/* ====== WEEK SELECTOR ====== */
.week-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}
.week-btn {
  padding: 8px 14px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1.5px solid var(--border-light);
  background: var(--card);
  color: var(--text);
  transition: var(--transition);
  white-space: nowrap;
}
.week-btn:hover {
  border-color: var(--copper);
  color: var(--copper);
}
.week-btn.selected {
  border-color: var(--copper);
  background: var(--copper);
  color: #fff;
  font-weight: 600;
}

/* ====== TEXTAREA ====== */
.textarea-wrapper {
  margin-bottom: 20px;
}
.textarea-wrapper textarea {
  width: 100%;
  min-height: 150px;
  padding: 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  font-family: inherit;
  color: var(--text);
  background: var(--card);
  resize: vertical;
  transition: var(--transition);
  outline: none;
  line-height: 1.7;
}
.textarea-wrapper textarea:focus {
  border-color: var(--copper);
  box-shadow: 0 0 0 3px rgba(184,115,51,0.1);
}
.textarea-wrapper textarea::placeholder {
  color: #BFB8B0;
}
.char-count {
  text-align: right;
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

/* ====== SUBMIT BUTTON ====== */
.submit-area {
  position: sticky;
  bottom: 72px;
  padding: 16px 20px 12px;
  margin: 0 -20px;
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  z-index: 10;
}
.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  background: var(--copper-gradient);
  color: #fff;
  transition: var(--transition);
  letter-spacing: 0.04em;
  box-shadow: 0 2px 12px rgba(184,115,51,0.3);
}
.submit-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(184,115,51,0.4);
}
.submit-btn:active {
  transform: translateY(0);
}
.submit-btn:disabled {
  background: #D5D1CB;
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
.submit-btn.loading {
  pointer-events: none;
  opacity: 0.8;
}
.submit-helper {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
}

/* ====== TOAST / MESSAGE ====== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  border-radius: var(--radius-full);
  font-size: 14px;
  font-weight: 500;
  z-index: 200;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s ease;
  max-width: 90vw;
  text-align: center;
}
.toast.success {
  background: var(--success);
  color: #fff;
}
.toast.error {
  background: var(--danger);
  color: #fff;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ====== BOTTOM TAB BAR ====== */
.bottom-tab-bar {
  display: flex;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 6px 0 env(safe-area-inset-bottom, 0);
  max-width: 480px;
  margin: 0 auto;
}
.bottom-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 6px 4px;
  border: none;
  background: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--muted);
  transition: var(--transition);
  text-decoration: none;
  font-size: 11px;
  font-weight: 500;
}
.bottom-tab .tab-icon {
  font-size: 20px;
  line-height: 1;
}
.bottom-tab.active {
  color: var(--copper);
}
.bottom-tab:hover {
  color: var(--copper);
}

/* ====== LOADING SPINNER ====== */
.loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(253,251,247,0.7);
  backdrop-filter: blur(2px);
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--copper);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ====== SCROLLBAR ====== */
.student-grid::-webkit-scrollbar {
  width: 4px;
}
.student-grid::-webkit-scrollbar-track {
  background: transparent;
}
.student-grid::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}
</style>
</head>

<script>
// ====== CONFIGURATION ======
var RELAY_URL = 'https://1430780242-0nq7px6f3u.ap-shanghai.tencentscf.com';

// ====== STATE ======
var groupsData = {};
var allMembers = [];
var selectedStudent = null;
var selectedGroup = null;
var selectedType = '本周作业';
var selectedWeek = 6;

// Week definitions
var weeks = [
  { num: 1, date: '5/25' },
  { num: 2, date: '6/3' },
  { num: 3, date: '6/9' },
  { num: 4, date: '6/17' },
  { num: 5, date: '6/22' },
  { num: 6, date: '6/29' }
];

// ====== DOM REFS ======
var searchInput = document.getElementById('searchInput');
var studentGrid = document.getElementById('studentGrid');
var groupFilterChips = document.getElementById('groupFilterChips');
var typeChipsEl = document.getElementById('typeChips');
var weekSelector = document.getElementById('weekSelector');
var contentInput = document.getElementById('contentInput');
var charCountEl = document.getElementById('charCount');
var submitBtn = document.getElementById('submitBtn');
var loadingOverlay = document.getElementById('loadingOverlay');
var toastContainer = document.getElementById('toastContainer');

// ====== STEP INDICATOR UPDATE ======
function updateStepIndicator() {
  var step = 1;
  if (selectedStudent) step = 2;
  if (selectedStudent && selectedType) step = 3;

  var s1c = document.getElementById('step1Circle');
  var s2c = document.getElementById('step2Circle');
  var s3c = document.getElementById('step3Circle');
  var c1 = document.getElementById('conn1');
  var c2 = document.getElementById('conn2');
  var s1l = document.getElementById('step1Label');
  var s2l = document.getElementById('step2Label');
  var s3l = document.getElementById('step3Label');

  // Reset all
  [s1c, s2c, s3c].forEach(function(c) { c.className = 'step-circle future'; });
  [s1l, s2l, s3l].forEach(function(l) { l.className = 'step-label'; });
  [c1, c2].forEach(function(c) { c.className = 'step-connector'; });

  if (step === 1) {
    s1c.className = 'step-circle current';
    s1l.className = 'step-label active';
  } else if (step === 2) {
    s1c.className = 'step-circle done';
    s1c.textContent = '✓';
    s1l.className = 'step-label done-label';
    c1.className = 'step-connector done';
    s2c.className = 'step-circle current';
    s2l.className = 'step-label active';
  } else if (step === 3) {
    s1c.className = 'step-circle done';
    s1c.textContent = '✓';
    s1l.className = 'step-label done-label';
    c1.className = 'step-connector done';
    s2c.className = 'step-circle done';
    s2c.textContent = '✓';
    s2l.className = 'step-label done-label';
    c2.className = 'step-connector done';
    s3c.className = 'step-circle current';
    s3l.className = 'step-label active';
  }
}

// ====== TOAST ======
function showToast(message, type) {
  type = type || 'success';
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  toastContainer.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(function() { toast.remove(); }, 300);
  }, 2500);
}

// ====== LOADING ======
function showLoading() { loadingOverlay.style.display = 'flex'; }
function hideLoading() { loadingOverlay.style.display = 'none'; }

// ====== FETCH GROUPS ======
function loadGroups() {
  showLoading();
  fetch('groups.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      groupsData = data;
      allMembers = [];
      var groupKeys = Object.keys(data).sort(function(a, b) {
        return parseInt(a) - parseInt(b);
      });
      groupKeys.forEach(function(gk) {
        var g = data[gk];
        g.members.forEach(function(m) {
          allMembers.push({
            name: m,
            group: gk,
            isLeader: m === g.leader
          });
        });
      });
      renderGroupChips();
      renderWeekSelector();
      renderStudents(allMembers);
      hideLoading();
    })
    .catch(function(err) {
      hideLoading();
      showToast('加载分组数据失败: ' + err.message, 'error');
    });
}

// ====== RENDER GROUP FILTER CHIPS ======
function renderGroupChips() {
  var groupKeys = Object.keys(groupsData).sort(function(a, b) {
    return parseInt(a) - parseInt(b);
  });
  var html = '<button class="group-chip active" data-group="all">全部</button>';
  groupKeys.forEach(function(gk) {
    var count = groupsData[gk].members.length;
    html += '<button class="group-chip" data-group="' + gk + '">' + gk + '(' + count + '人)</button>';
  });
  groupFilterChips.innerHTML = html;

  // Bind click events
  var chips = groupFilterChips.querySelectorAll('.group-chip');
  chips.forEach(function(chip) {
    chip.addEventListener('click', function() {
      chips.forEach(function(c) { c.classList.remove('active'); });
      this.classList.add('active');
      var group = this.getAttribute('data-group');
      filterStudents(group);
    });
  });
}

function filterStudents(group) {
  var filtered;
  if (group === 'all') {
    filtered = allMembers;
  } else {
    filtered = allMembers.filter(function(m) { return m.group === group; });
  }
  renderStudents(filtered);
}

// ====== RENDER STUDENTS ======
function renderStudents(members) {
  var searchTerm = (searchInput.value || '').trim().toLowerCase();
  var filtered = members;
  if (searchTerm) {
    filtered = members.filter(function(m) {
      return m.name.toLowerCase().indexOf(searchTerm) !== -1;
    });
  }

  var html = '';
  filtered.forEach(function(m) {
    var isSelected = selectedStudent && selectedStudent.name === m.name;
    var cls = 'student-card' + (isSelected ? ' selected' : '');
    var star = m.isLeader ? '<span class="leader-star">&#9733;</span>' : '';
    html += '<button class="' + cls + '" data-name="' + m.name + '" data-group="' + m.group + '">'
      + m.name + star + '</button>';
  });

  if (filtered.length === 0) {
    html = '<div style="grid-column: 1 / -1; text-align: center; padding: 24px; color: var(--muted); font-size: 14px;">未找到匹配的学员</div>';
  }

  studentGrid.innerHTML = html;

  // Bind click events
  var cards = studentGrid.querySelectorAll('.student-card');
  cards.forEach(function(card) {
    card.addEventListener('click', function() {
      var name = this.getAttribute('data-name');
      var group = this.getAttribute('data-group');
      selectedStudent = { name: name, group: group };
      selectedGroup = group;
      renderStudents(allMembers);
      updateStepIndicator();
      // Scroll to type section
      document.getElementById('typeChips').scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  });
}

// ====== RENDER WEEK SELECTOR ======
function renderWeekSelector() {
  var html = '';
  weeks.forEach(function(w) {
    var cls = 'week-btn' + (w.num === selectedWeek ? ' selected' : '');
    html += '<button class="' + cls + '" data-week="' + w.num + '">第' + w.num + '周 ' + w.date + '</button>';
  });
  weekSelector.innerHTML = html;

  // Bind click events
  var btns = weekSelector.querySelectorAll('.week-btn');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      btns.forEach(function(b) { b.classList.remove('selected'); });
      this.classList.add('selected');
      selectedWeek = parseInt(this.getAttribute('data-week'));
    });
  });
}

// ====== SEARCH INPUT ======
searchInput.addEventListener('input', function() {
  var activeChip = groupFilterChips.querySelector('.group-chip.active');
  var group = activeChip ? activeChip.getAttribute('data-group') : 'all';
  var baseMembers = group === 'all' ? allMembers : allMembers.filter(function(m) { return m.group === group; });
  renderStudents(baseMembers);
});

// ====== TYPE CHIPS ======
var typeChipBtns = typeChipsEl.querySelectorAll('.type-chip');
typeChipBtns.forEach(function(chip) {
  chip.addEventListener('click', function() {
    typeChipBtns.forEach(function(c) { c.classList.remove('selected'); });
    this.classList.add('selected');
    selectedType = this.getAttribute('data-type');
    updateStepIndicator();
  });
});

// ====== CHAR COUNT ======
contentInput.addEventListener('input', function() {
  var len = this.value.length;
  charCountEl.textContent = len + ' 字';
});

// ====== SUBMIT ======
function handleSubmit() {
  // Validate
  if (!selectedStudent) {
    showToast('请先选择学员', 'error');
    return;
  }
  if (!selectedType) {
    showToast('请选择作业类型', 'error');
    return;
  }
  var content = contentInput.value.trim();
  if (!content) {
    showToast('请输入作业内容', 'error');
    contentInput.focus();
    return;
  }

  var payload = {
    '姓名': selectedStudent.name,
    '组别': selectedStudent.group,
    '第几周': selectedWeek,
    '作业类型': selectedType,
    '作业内容': content
  };

  submitBtn.disabled = true;
  submitBtn.classList.add('loading');
  submitBtn.textContent = '提交中...';

  fetch(RELAY_URL + '/submit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        showToast('作业提交成功！', 'success');
        // Reset form
        contentInput.value = '';
        charCountEl.textContent = '0 字';
        selectedStudent = null;
        selectedGroup = null;
        // Reset step indicator
        updateStepIndicator();
        // Re-render students to clear selection
        renderStudents(allMembers);
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        showToast('提交失败: ' + (data.error || '未知错误'), 'error');
      }
    })
    .catch(function(err) {
      showToast('网络错误: ' + err.message, 'error');
    })
    .finally(function() {
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
      submitBtn.textContent = '提交作业';
    });
}

// ====== INIT ======
loadGroups();
updateStepIndicator();
</script>
