<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>百日营 · 总览仪表盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="desktop.css">
</head>
<body>
  <nav class="desktop-nav">
    <span class="nav-brand">百日营</span>
    <div class="nav-links">
      <a href="./index.html" class="nav-link active">📊 总览</a>
      <a href="./review.html" class="nav-link">📝 点评</a>
      <a href="./submit.html" class="nav-link">✍️ 提交</a>
      <a href="./attendance.html" class="nav-link">📋 出勤</a>
      <a href="./profile.html" class="nav-link">👤 档案</a>
    </div>
  </nav>

<div class="app-container">
  <header class="page-header">
    <p class="page-subtitle">百日营 · 全营</p>
    <h1 class="page-title">总览仪表盘</h1>
  </header>

  <div class="stat-cards" id="statCards">
    <div class="stat-card"><div class="stat-number" id="statTotalMembers">--</div><div class="stat-label">学员总数</div><div class="stat-sub">7组覆盖</div></div>
    <div class="stat-card"><div class="stat-number" id="statGroups">7</div><div class="stat-label">小组数</div><div class="stat-sub">每组 8-10 人</div></div>
    <div class="stat-card"><div class="stat-number" id="statCurrentWeek">第6周</div><div class="stat-label">当前周</div><div class="stat-sub">6/29</div></div>
    <div class="stat-card"><div class="stat-number" id="statStartDate">5/21</div><div class="stat-label">开营日期</div><div class="stat-sub">2026</div></div>
  </div>

  <div class="filter-chips" id="groupFilter">
    <button class="filter-chip active" data-group="all">全部</button>
  </div>

  <div class="week-chips" id="weekFilter">
    <button class="week-chip active" data-week="all">全部</button>
    <button class="week-chip" data-week="1">第1周<span class="week-date">5/25</span></button>
    <button class="week-chip" data-week="2">第2周<span class="week-date">6/3</span></button>
    <button class="week-chip" data-week="3">第3周<span class="week-date">6/9</span></button>
    <button class="week-chip" data-week="4">第4周<span class="week-date">6/17</span></button>
    <button class="week-chip" data-week="5">第5周<span class="week-date">6/22</span></button>
    <button class="week-chip" data-week="6">第6周<span class="week-date">6/29</span></button>
  </div>

  <div class="member-list" id="memberList">
    <div class="loading">加载中…</div>
  </div>

  <div class="list-footer" id="listFooter">显示 -- / -- 名学员</div>
</div>

<nav class="bottom-nav">
  <a href="./index.html" class="nav-item active"><span class="nav-icon">📊</span><span class="nav-label">总览</span></a>
  <a href="./review.html" class="nav-item"><span class="nav-icon">📝</span><span class="nav-label">点评</span></a>
  <a href="./submit.html" class="nav-item"><span class="nav-icon">✍️</span><span class="nav-label">提交</span></a>
  <a href="./attendance.html" class="nav-item"><span class="nav-icon">📋</span><span class="nav-label">出勤</span></a>
  <a href="./profile.html" class="nav-item"><span class="nav-icon">👤</span><span class="nav-label">档案</span></a>
</nav>

<script>
const RELAY_URL = 'https://1430780242-0nq7px6f3u.ap-shanghai.tencentscf.com';
let allMembers = [], allGroups = {}, allAttendance = [], allSubmissions = [];
let activeGroup = 'all', activeWeek = 'all';

// Load all data
// Phase 1: Load groups + attendance (same-origin, always fast)
Promise.all([
  fetch('groups.json').then(r=>r.json()),
  fetch('attendance.json').then(r=>r.json())
]).then(function(results) {
  allGroups = results[0];
  allAttendance = results[1];
  
  Object.keys(allGroups).forEach(function(g) {
    allGroups[g].members.forEach(function(name) {
      allMembers.push({ name: name, group: g, is_leader: name === allGroups[g].leader });
    });
  });
  
  document.getElementById('statTotalMembers').textContent = allMembers.length;
  renderGroupChips();
  renderMembers();
  
  // Phase 2: Load submissions from SCF in background (may be slow)
  var controller = new AbortController();
  var timeout = setTimeout(function() { controller.abort(); }, 5000);
  fetch(RELAY_URL + '/submissions', { signal: controller.signal })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      clearTimeout(timeout);
      if (data && data.records) allSubmissions = data.records;
    })
    .catch(function() { /* silent fail - data will show without submissions */ });
}).catch(function(err) {
  console.error('Data load failed:', err);
  document.getElementById('memberList').innerHTML = '<div class="loading">数据加载失败，请刷新重试</div>';
});

function renderGroupChips() {
  var html = '<button class="filter-chip active" data-group="all">全部</button>';
  Object.keys(allGroups).sort().forEach(function(g) {
    html += '<button class="filter-chip" data-group="' + g + '">' + g + '<span class="chip-count">' + allGroups[g].members.length + '</span></button>';
  });
  document.getElementById('groupFilter').innerHTML = html;
  
  document.getElementById('groupFilter').addEventListener('click', function(e) {
    var chip = e.target.closest('.filter-chip');
    if (!chip) return;
    document.querySelectorAll('#groupFilter .filter-chip').forEach(function(c) { c.classList.remove('active'); });
    chip.classList.add('active');
    activeGroup = chip.dataset.group;
    renderMembers();
  });
  
  document.getElementById('weekFilter').addEventListener('click', function(e) {
    var chip = e.target.closest('.week-chip');
    if (!chip) return;
    document.querySelectorAll('#weekFilter .week-chip').forEach(function(c) { c.classList.remove('active'); });
    chip.classList.add('active');
    activeWeek = chip.dataset.week;
    renderMembers();
  });
}

function getMemberProgress(member) {
  var name = member.name;
  var att_count = 0, att_total = 0;
  var hw_count = 0, share_count = 0, qa_count = 0;
  
  // Attendance from attendance.json
  allAttendance.forEach(function(w) {
    var wk = w.week;
    if (activeWeek !== 'all' && String(wk) !== activeWeek) return;
    att_total++;
    if (w[name] === 1) att_count++;
  });
  
  // Submissions from SCF API
  if (allSubmissions && allSubmissions.length) {
    allSubmissions.forEach(function(rec) {
      var fields = rec.fields || rec;
      var fname = fields['姓名'] || fields.name || '';
      var fweek = parseInt((fields['第几周'] || fields.week || '0').toString().replace(/[^0-9]/g,'')) || 0;
      var ftype = fields['作业类型'] || fields.type || '';
      
      if (fname !== name) return;
      if (activeWeek !== 'all' && fweek !== parseInt(activeWeek)) return;
      
      if (ftype === '本周作业' || ftype === '作业') hw_count++;
      else if (ftype === '本周分享' || ftype === '分享') share_count++;
      else if (ftype === '学员答疑' || ftype === '答疑') qa_count++;
    });
  }
  
  var totalWeeks = activeWeek === 'all' ? Math.max(1, allAttendance.length) : 1;
  var attPct = att_total > 0 ? Math.round(att_count / att_total * 100) : 0;
  var hwPct = totalWeeks > 0 ? Math.min(100, Math.round(hw_count / totalWeeks * 100)) : 0;
  var sharePct = totalWeeks > 0 ? Math.min(100, Math.round(share_count / totalWeeks * 100)) : 0;
  var qaPct = totalWeeks > 0 ? Math.min(100, Math.round(qa_count / totalWeeks * 100)) : 0;
  
  var score = attPct * 0.4 + hwPct * 0.3 + sharePct * 0.15 + qaPct * 0.15;
  var status = score >= 60 ? '优秀' : score >= 20 ? '已起步' : '未开始';
  var borderClass = score >= 60 ? 'border-success' : score >= 20 ? 'border-warning' : 'border-danger';
  
  return { attPct: attPct, hwPct: hwPct, sharePct: sharePct, qaPct: qaPct, score: score, status: status, borderClass: borderClass, att_count: att_count, att_total: att_total, hw_count: hw_count, share_count: share_count, qa_count: qa_count };
}

function renderMembers() {
  var filtered = allMembers;
  if (activeGroup !== 'all') filtered = allMembers.filter(function(m) { return m.group === activeGroup; });
  
  var html = '';
  filtered.forEach(function(m) {
    var p = getMemberProgress(m);
    html += '<div class="member-card ' + p.borderClass + '" onclick="showMemberDetail('' + m.name.replace(/'/g, "\\'") + '')">';
    html += '<div class="card-left">';
    html += '<div class="card-name">' + m.name + '</div>';
    html += '<div class="card-badges">';
    html += m.is_leader ? '<span class="badge badge-leader">组长</span>' : '<span class="badge badge-member">组员</span>';
    html += '<span class="badge badge-group">' + m.group + '</span>';
    html += '</div></div>';
    html += '<div class="card-right">';
    html += '<span class="status-badge status-' + (p.status === '优秀' ? 'success' : p.status === '已起步' ? 'warning' : 'danger') + '">' + p.status + '</span>';
    html += '</div></div>';
    html += '<div class="card-progress">';
    html += progressBar('本周作业', p.hwPct, p.hw_count, p.att_total > 0 ? p.att_total : 6);
    html += progressBar('本周分享', p.sharePct, p.share_count, p.att_total > 0 ? p.att_total : 6);
    html += progressBar('学员答疑', p.qaPct, p.qa_count, p.att_total > 0 ? p.att_total : 6);
    html += progressBar('出勤', p.attPct, p.att_count, p.att_total);
    html += '</div>';
  });
  
  if (!filtered.length) html = '<div class="loading">暂无学员数据</div>';
  document.getElementById('memberList').innerHTML = html;
  document.getElementById('listFooter').textContent = '显示 ' + filtered.length + ' / ' + allMembers.length + ' 名学员';
}

function progressBar(label, pct, count, total) {
  var color = pct >= 80 ? 'success' : pct >= 40 ? 'warning' : 'danger';
  return '<div class="progress-row"><span class="progress-label">' + label + '</span><div class="progress-track"><div class="progress-fill fill-' + color + '" style="width:' + pct + '%"></div></div><span class="progress-num">' + count + '/' + total + '</span></div>';
}

function showMemberDetail(name) {
  var m = allMembers.find(function(x) { return x.name === name; });
  if (!m) return;
  var p = getMemberProgress(m);
  alert(m.name + ' · ' + m.group + '\n' + (m.is_leader ? '组长 · ' : '组员 · ') + p.status + '\n\n出勤: ' + p.att_count + '/' + p.att_total + '\n作业: ' + p.hw_count + '/' + (p.att_total || 6) + '\n分享: ' + p.share_count + '/' + (p.att_total || 6) + '\n答疑: ' + p.qa_count + '/' + (p.att_total || 6));
}
</script>
</body>
</html>
